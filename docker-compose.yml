version: '3.9'
services:
  observer:
    build: .
    container_name: unified_observer
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: python scripts/server.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
